<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <title>Portfolio — NEWDAY FILM</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .portfolio-hero {
      padding: 100px 60px 60px;
      border-bottom: 1px solid var(--color-border);
    }

    .portfolio-hero__label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 24px;
    }

    .portfolio-hero__title {
      font-family: var(--font-display);
      font-size: clamp(3rem, 7vw, 6rem);
      font-weight: 300;
      line-height: 1.0;
    }

    /* ── Filter Tabs ── */
    .portfolio-filter {
      padding: 40px 60px 0;
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--color-border);
      /* 모바일에서 탭이 넘칠 때 가로 스크롤 */
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .portfolio-filter::-webkit-scrollbar { display: none; }

    .filter-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 12px 28px;
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
      margin-bottom: -1px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .filter-btn:hover { color: var(--color-text); }

    .filter-btn.active {
      color: var(--color-accent);
      border-bottom-color: var(--color-accent);
    }

    /* ── Video Grid ── */
    .portfolio-grid {
      padding: 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 32px;
    }

    .video-card {
      position: relative;
      cursor: pointer;
      overflow: hidden;
    }

    .video-card__thumb {
      position: relative;
      aspect-ratio: 16/10;
      overflow: hidden;
      background: var(--color-surface);
    }

    .video-card__thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .video-card:hover .video-card__thumb img {
      transform: scale(1.05);
    }

    .video-card__overlay {
      position: absolute;
      inset: 0;
      background: rgba(14, 13, 11, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .video-card:hover .video-card__overlay {
      opacity: 1;
    }

    /* 모바일: 터치 기기는 hover 없으므로 항상 약하게 표시 */
    @media (hover: none) {
      .video-card__overlay {
        opacity: 1;
        background: rgba(14, 13, 11, 0.25);
      }
    }

    .video-card__play {
      width: 56px;
      height: 56px;
      border: 1px solid var(--color-accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-accent);
      font-size: 1.2rem;
    }

    .video-card__duration {
      position: absolute;
      bottom: 10px;
      right: 12px;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--color-accent-light);
      background: rgba(14,13,11,0.7);
      padding: 2px 8px;
    }

    .video-card__info {
      padding: 16px 0 8px;
    }

    .video-card__tag {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 6px;
    }

    .video-card__title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--color-text);
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(14, 13, 11, 0.96);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox__inner {
      width: 100%;
      max-width: 960px;
    }

    .lightbox__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .lightbox__title {
      font-family: var(--font-display);
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: var(--color-text);
    }

    .lightbox__close {
      cursor: pointer;
      font-size: 1.2rem;
      color: var(--color-muted);
      transition: color var(--transition);
      padding: 8px;
      flex-shrink: 0;
    }

    .lightbox__close:hover { color: var(--color-accent); }

    .lightbox__video {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
    }

    .lightbox__video iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* 영상 없을 때 표시 */
    .lightbox__empty {
      display: none;
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--color-surface);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: var(--color-muted);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .portfolio-hero { padding: 80px 24px 40px; }
      .portfolio-filter { padding: 0 24px; }
      .portfolio-grid { padding: 32px 24px; grid-template-columns: 1fr 1fr; gap: 16px; }
    }

    @media (max-width: 480px) {
      .portfolio-grid { grid-template-columns: 1fr; gap: 20px; }
    }
  </style>
</head>

  <script>
    /* ============================================================
       유튜브 / 비메오 URL → embed URL 자동 변환
       어떤 형식이든 붙여넣기만 하면 됩니다:
         youtube.com/watch?v=ID  →  youtube.com/embed/ID  ✅
         youtu.be/ID             →  youtube.com/embed/ID  ✅
         youtube.com/embed/ID   →  그대로 사용           ✅
         vimeo.com/ID            →  player.vimeo.com/...  ✅
    ============================================================ */
    function toEmbedUrl(url) {
      if (!url) return '';

      // 이미 embed 형식
      if (url.includes('youtube.com/embed/') || url.includes('player.vimeo.com/video/')) {
        return url;
      }
      // youtube.com/watch?v=
      const ytWatch = url.match(/youtube\.com\/watch\?(?:.*&)?v=([a-zA-Z0-9_-]+)/);
      if (ytWatch) return 'https://www.youtube.com/embed/' + ytWatch[1];

      // youtu.be/
      const ytShort = url.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
      if (ytShort) return 'https://www.youtube.com/embed/' + ytShort[1];

      // vimeo.com/ID
      const vimeo = url.match(/vimeo\.com\/(\d+)/);
      if (vimeo) return 'https://player.vimeo.com/video/' + vimeo[1];

      return url;
    }

    /* ============================================================
       포트폴리오 데이터
       videoUrl: 유튜브 링크 아무 형식이나 붙여넣기 OK
         'https://www.youtube.com/watch?v=XXXXX'  ← watch 링크
         'https://youtu.be/XXXXX'                 ← 단축 링크

        duration: '',
        videoUrl: ''

    // ── Render ──
    const grid = document.getElementById('portfolioGrid');

    function renderGrid(filter) {
      grid.innerHTML = '';
      videoData.forEach(v => {
        const visible = filter === 'all' || v.category === filter;
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
          <div class="video-card__thumb">
            <img src="${v.thumb}" alt="${v.title}" loading="lazy" />
            <div class="video-card__overlay">
              <div class="video-card__play">▶</div>
            </div>
            ${v.duration ? `<div class="video-card__duration">${v.duration}</div>` : ''}
          </div>
          <div class="video-card__info">
            <div class="video-card__tag">${v.category}</div>
            <div class="video-card__title">${v.title}</div>
          </div>
        `;
        if (!visible) card.style.display = 'none';
        card.addEventListener('click', () => openLightbox(v));
        grid.appendChild(card);
      });
    }

    function openLightbox(v) {
      document.getElementById('lightboxTitle').textContent = v.title;
      const iframe = document.getElementById('lightboxIframe');
      const videoBox = document.getElementById('lightboxVideo');
      const emptyBox = document.getElementById('lightboxEmpty');
      const embedUrl = toEmbedUrl(v.videoUrl);

      if (embedUrl) {
        // autoplay 파라미터 추가
        const sep = embedUrl.includes('?') ? '&' : '?';
        iframe.src = embedUrl + sep + 'autoplay=1';
        videoBox.style.display = 'block';
        emptyBox.style.display = 'none';
      } else {
        iframe.src = '';
        videoBox.style.display = 'none';
        emptyBox.style.display = 'flex';
      }

      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.getElementById('lightboxIframe').src = '';
      document.body.style.overflow = '';
    }

    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);

    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });

    // ESC 키로 닫기
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });

    // Filter
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGrid(btn.dataset.filter);
      });
    });

    renderGrid('all');

    // Mobile menu
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('mobileMenu').classList.add('open');
    });
    document.getElementById('mobileClose').addEventListener('click', () => {
      document.getElementById('mobileMenu').classList.remove('open');
    });
